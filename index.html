<script>
const CV_DATA = JSON.parse(document.getElementById('cv-data').textContent);

function render() {
  const d = CV_DATA;
  const app = document.getElementById('app');

  const exp = d.experience.map(e => `
    <div class="exp-item">
      <div class="exp-period">${e.periode}</div>
      <div class="exp-org">${e.organisation}</div>
      <div class="exp-role">${e.poste}</div>
      <ul>${e.missions.map(m => `<li>${m}</li>`).join('')}</ul>
      ${e.url ? `<div class="pub-more-link"><a href="${e.url}" target="_blank" rel="noopener">${e.urlLabel || 'En savoir plus →'}</a></div>` : ''}
    </div>
  `).join('');

  const certifs = d.certifications.map(c =>
    c.url ? `<li><a href="${c.url}" target="_blank" rel="noopener">${c.label}</a></li>` : `<li>${c.label || c}</li>`
  ).join('');
  const academique = d.parcoursAcademique.map(c => `<li>${c}</li>`).join('');
  const activites = d.activitesEtInterets.map(c => `<li>${c}</li>`).join('');
  const langues = d.langues.map(c => `<div class="lang-row"><span class="langue">${c.langue}</span><span class="niveau">${c.niveau}</span></div>`).join('');

  const stats = (d.stats || []).map(s => `
    <div class="stat"><div class="stat-num">${s.valeur}</div><div class="stat-label">${s.label}</div></div>
  `).join('');

  const publications = (d.publications || []).map(p => `<div class="pub-item">${p}</div>`).join('');

  const re = d.rechercheEnseignement;
  const rechercheBlock = re ? `
    <h2 class="section"><span class="dot"></span>Recherche et enseignement</h2>
    <div class="exp-item">
      <div class="exp-period">${re.enseignement.periode}</div>
      <div class="exp-org">${re.enseignement.titre}</div>
      <ul>
        <li>${re.rechercheLabel}</li>
        ${re.enseignement.points.map(p => `<li>${p}</li>`).join('')}
      </ul>
    </div>
  ` : '';

  const domaines = d.competences.map(s => `<div class="domain-item">${s.label}</div>`).join('');
  const aptitudes = (d.aptitudes || []).map(s => `<div class="domain-item">${s.label}</div>`).join('');
  const geographie = (d.geographie || []).join(' · ');

  app.innerHTML = `
    <header class="masthead">
      <div>
        <h1>${d.identite.nom}<span class="k-dot">.</span></h1>
        <div class="eyebrow"><span class="dot"></span> ${d.identite.titre}</div>
      </div>
      <div class="contact-block">
        <div><a href="https://wa.me/${d.identite.contact.whatsapp.replace(/[^0-9]/g,'')}" target="_blank" rel="noopener">WhatsApp ${d.identite.contact.whatsapp}</a></div>
        ${d.identite.contact.linkedin ? `<div><a href="${d.identite.contact.linkedin}" target="_blank" rel="noopener">LinkedIn</a></div>` : ''}
        <div><a href="mailto:${d.identite.contact.email}">${d.identite.contact.email}</a></div>
        <div><a href="https://${d.identite.contact.site}">${d.identite.contact.site}</a></div>
      </div>
    </header>

    <p class="tagline">${d.identite.accroche}</p>

    <div class="stats-bar">${stats}</div>

    <div class="cv-body">
      <aside class="sidebar">
        <div class="sidebar-block">
          <div class="sidebar-label">Certifications</div>
          <ul class="plain-list">${certifs}</ul>
        </div>
        <div class="sidebar-block">
          <div class="sidebar-label">Domaines d'intervention</div>
          ${domaines}
        </div>
        <div class="sidebar-block">
          <div class="sidebar-label">Compétences</div>
          ${aptitudes}
        </div>
        <div class="sidebar-block">
          <div class="sidebar-label">Langues</div>
          ${langues}
        </div>
        <div class="sidebar-block">
          <div class="sidebar-label">Géographie</div>
          <div class="geo-list">${geographie}</div>
        </div>
        <div class="sidebar-block">
          <div class="sidebar-label">Activités et intérêts</div>
          <ul class="plain-list">${activites}</ul>
        </div>
      </aside>

      <div class="main-col">
        <h2 class="section" style="margin-top:0;"><span class="dot"></span>À mon sujet</h2>
        <p style="font-size:13.5px;margin-bottom:32px;">${d.aPropos}</p>

        <h2 class="section"><span class="dot"></span>Expérience</h2>
        ${exp}

        ${rechercheBlock}

        <h2 class="section" style="margin-top:32px;"><span class="dot"></span>Formation académique</h2>
        <ul class="plain-list">${academique}</ul>

        ${publications ? `<h2 class="section" style="margin-top:32px;"><span class="dot"></span>Publications</h2>${publications}${d.publicationsUrl ? `<div class="pub-more-link"><a href="${d.publicationsUrl}" target="_blank" rel="noopener">Voir toutes mes publications →</a></div>` : ''}` : ''}
      </div>
    </div>

    <div class="footer">
      ${d.identite.contact.whatsapp} · ${d.identite.contact.email} · ${d.identite.contact.site}${d.identite.contact.linkedin ? ` · <a href="${d.identite.contact.linkedin}" target="_blank" rel="noopener" style="color:inherit;">LinkedIn</a>` : ''}
    </div>
  `;
}
render();
</script>
