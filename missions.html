<script>
function render() {
  const d = JSON.parse(document.getElementById('missions-data').textContent);
  const app = document.getElementById('app');

  const allItems = [...d.conseil, ...d.formation, ...d.independant];
  const paysSet = new Set();
  allItems.forEach(m => m.pays.forEach(p => paysSet.add(p)));
  const secteurSet = new Set(allItems.map(m => m.secteur));

  const paysOptions = [...paysSet].sort().map(p => `<option value="${p}">${p}</option>`).join('');
  const secteurOptions = [...secteurSet].sort().map(s => `<option value="${s}">${s}</option>`).join('');

  function missionItem(m) {
    const badgeType = m.type === 'conseil' ? 'type-conseil' : 'type-formation';
    return `
    <div class="mission-item" data-type="${m.type}" data-pays="${m.pays.join('|')}" data-secteur="${m.secteur}">
      <div class="mission-meta">
        <span class="periode">${m.periode}</span>
        ${m.pays.join(', ')}
        <div class="mission-badges">
          <span class="badge ${badgeType}">${m.type}</span>
          <span class="badge">${m.secteur}</span>
        </div>
      </div>
      <div>
        <div class="mission-client">${m.client}</div>
        <div class="mission-desc">${m.description}</div>
        ${m.contexte ? `<div class="mission-context">${m.contexte}</div>` : ''}
      </div>
    </div>`;
  }

  const conseilHtml = d.conseil.map(missionItem).join('');
  const formationHtml = d.formation.map(missionItem).join('');
  const independantHtml = d.independant.map(missionItem).join('');

  const postesHtml = d.postes.map(p => `
    <div class="poste-block">
      <div class="mission-meta" style="margin-bottom:6px;"><span class="periode">${p.periode}</span></div>
      <div class="poste-org">${p.organisation}</div>
      <div class="poste-role">${p.poste}</div>
      ${p.contexte ? `<div class="poste-context">${p.contexte}</div>` : ''}
      <ul class="plain-list">${p.missions.map(m => `<li>${m}</li>`).join('')}</ul>
    </div>
  `).join('');

  const certifHtml = d.certifications.map(c => `
    <div class="cert-detail">
      <div>${c.url ? `<a href="${c.url}" target="_blank" rel="noopener">${c.label}</a>` : c.label} <span class="cert-annee">${c.annee}</span></div>
      <div class="cert-org">${c.org}</div>
    </div>
  `).join('');

  const refHtml = d.references.map(r => `
    <div class="ref-block">
      <div class="ref-name">${r.nom}</div>
      <div class="ref-titre">${r.titre}</div>
      <div class="ref-contact">${r.tel} · <a href="mailto:${r.email}">${r.email}</a></div>
      <div class="ref-note">${r.note}</div>
    </div>
  `).join('');

  app.innerHTML = `
    <header class="masthead">
      <div>
        <h1>${d.identite.nom}<span class="k-dot">.</span></h1>
        <div class="eyebrow"><span class="dot"></span> ${d.identite.titre}</div>
      </div>
      <div class="contact-block">
        <div><a href="https://wa.me/${d.identite.contact.whatsapp.replace(/[^0-9]/g,'')}" target="_blank" rel="noopener">WhatsApp ${d.identite.contact.whatsapp}</a></div>
        <div><a href="${d.identite.contact.linkedin}" target="_blank" rel="noopener">LinkedIn</a></div>
        <div><a href="mailto:${d.identite.contact.email}">${d.identite.contact.email}</a></div>
        <div><a href="https://${d.identite.contact.site}">${d.identite.contact.site}</a></div>
      </div>
    </header>

    <p class="intro-block">${d.identite.accroche}</p>

    <nav class="toc">
      <a href="#postes">Postes précédents</a>
      <a href="#conseil">Missions de conseil (${d.conseil.length})</a>
      <a href="#formation">Missions de formation (${d.formation.length})</a>
      <a href="#independant">Consultant indépendant (${d.independant.length})</a>
      <a href="#certifications">Certifications</a>
      <a href="#references">Références</a>
    </nav>

    <div class="filter-bar">
      <select id="f-type">
        <option value="">Tous les types</option>
        <option value="conseil">Conseil</option>
        <option value="formation">Formation</option>
      </select>
      <select id="f-pays">
        <option value="">Tous les pays</option>
        ${paysOptions}
      </select>
      <select id="f-secteur">
        <option value="">Tous les secteurs</option>
        ${secteurOptions}
      </select>
      <span class="filter-count" id="f-count"></span>
    </div>

    <h2 class="section-lg" id="postes">Postes précédents</h2>
    ${postesHtml}

    <h2 class="section-lg" id="conseil">Missions de conseil <span class="count">${d.conseil.length} missions, depuis 2015</span></h2>
    <div id="list-conseil">${conseilHtml}</div>

    <h2 class="section-lg" id="formation">Missions de formation <span class="count">${d.formation.length} missions, depuis 2015</span></h2>
    <div id="list-formation">${formationHtml}</div>

    <h2 class="section-lg" id="independant">Consultant indépendant <span class="count">${d.independant.length} missions, 1999-2015</span></h2>
    <div id="list-independant">${independantHtml}</div>

    <h2 class="section-lg" id="certifications">Certifications &amp; certificats</h2>
    ${certifHtml}

    <h2 class="section-lg" id="references">Références</h2>
    ${refHtml}

    <div class="footer">
      ${d.identite.contact.whatsapp} · ${d.identite.contact.email} · ${d.identite.contact.site} · <a href="${d.identite.contact.linkedin}" target="_blank" rel="noopener" style="color:inherit;">LinkedIn</a>
    </div>
  `;

  function applyFilters() {
    const type = document.getElementById('f-type').value;
    const pays = document.getElementById('f-pays').value;
    const secteur = document.getElementById('f-secteur').value;
    const items = app.querySelectorAll('.mission-item');
    let visible = 0;
    items.forEach(el => {
      const matchType = !type || el.dataset.type === type;
      const matchPays = !pays || el.dataset.pays.split('|').includes(pays);
      const matchSecteur = !secteur || el.dataset.secteur === secteur;
      const show = matchType && matchPays && matchSecteur;
      el.style.display = show ? 'grid' : 'none';
      if (show) visible++;
    });
    document.getElementById('f-count').textContent = visible + ' mission(s) affichée(s)';
  }

  document.getElementById('f-type').addEventListener('change', applyFilters);
  document.getElementById('f-pays').addEventListener('change', applyFilters);
  document.getElementById('f-secteur').addEventListener('change', applyFilters);
  applyFilters();
}
render();
</script>
